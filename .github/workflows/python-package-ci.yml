name: CI-CD

on: push
env:
  UV_SYSTEM_PYTHON: 1

jobs:
  test:
    name: Run ruff, ty and pytest 🧪
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv with cache
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.13
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libxml2-dev libxslt-dev
      - name: Install dependencies
        run: uv sync --locked --dev
      - name: Install crawl4ai/playwright
        run: uvx playwright install --with-deps chromium
      - name: Run ruff format
        run: uv run ruff format
      - name: Run ruff check
        run: uv run ruff check
      - name: Run ty check
        run: uv run ty check
      - name: Run tests
        run: uv run pytest

  build:
    name: Build distribution 📦
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv with cache
        uses: astral-sh/setup-uv@v7
        with:
          python-version: 3.13
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: uv sync --locked
      - name: Build a binary wheel and a source tarball
        run: uv build
      - name: Store the distribution packages
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-to-docker-hub:
    name: >-
      Publish Docker 🐳 image 📦 to Docker Hub
    if: startsWith(github.ref, 'refs/tags/')
    needs: publish-to-pypi
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKER_USERNAME }}/torrent-search-mcp
          tags: |
            type=ref,event=tag
            type=raw,value=latest
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          file: ./Dockerfile.publish
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: true
          sbom: true
          push: true
          build-args: VERSION=${{ github.ref_name }}
